<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynAIpse — Before / After Guardrail Comparison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --panel:#0e1426; --panel2:#121a30; --line:#1e2942;
  --txt:#e6ebf5; --muted:#8a97b3; --faint:#5d6b88;
  --cyan:#22d3ee; --red:#ef4444; --orange:#f59e0b; --yellow:#eab308; --green:#22c55e; --violet:#8b7bff;
  --shadow:0 24px 60px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(1100px 560px at 88% -10%,rgba(139,123,255,.10),transparent 60%),
    radial-gradient(800px 460px at 4% 2%,rgba(34,211,238,.07),transparent 55%),var(--bg);
  color:var(--txt);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;margin:0}
.mono{font-family:'JetBrains Mono',Consolas,monospace}
a{color:var(--cyan);text-decoration:none}
.topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:15px 30px;
  background:rgba(10,14,26,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:21px}
.brand b{color:var(--violet)} .brand em{font-style:normal;color:var(--muted)}
.topbar .sp{flex:1}
.back{font-size:13px;color:var(--muted);border:1px solid var(--line);border-radius:9px;padding:8px 14px}
.back:hover{border-color:var(--violet);color:var(--txt)}
.wrap{max-width:1080px;margin:0 auto;padding:34px 30px 70px}
.eyebrow{font-size:12px;letter-spacing:2.4px;text-transform:uppercase;color:var(--violet);font-weight:700}
h1.title{font-size:38px;font-weight:600;letter-spacing:-.5px;margin:8px 0 6px}
.sub{color:var(--muted);font-size:15px;max-width:760px}
.card{background:linear-gradient(180deg,var(--panel),#0b1120);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.sec-tag{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);font-weight:700;margin:38px 0 14px;display:flex;align-items:center;gap:10px}
.sec-tag .n{font-family:'JetBrains Mono',monospace;color:var(--violet)}

/* Hero scores */
.hero{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center;padding:30px 28px}
@media(max-width:760px){.hero{grid-template-columns:1fr;text-align:center}}
.dial{display:flex;flex-direction:column;align-items:center;gap:12px}
.gauge{position:relative;width:168px;height:168px;border-radius:50%;display:grid;place-items:center}
.gauge .in{position:absolute;inset:15px;background:#0b1120;border-radius:50%;display:grid;place-items:center;text-align:center}
.gauge .g{font-family:'Fraunces',serif;font-size:30px;font-weight:700;line-height:1}
.gauge .s{font-family:'Fraunces',serif;font-size:46px;font-weight:700;line-height:1}
.gauge .l{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);margin-top:6px;font-weight:700}
.dial .cap{font-size:13px;color:var(--muted)}
.dial .cap b{color:var(--txt)}
.arrow{display:flex;flex-direction:column;align-items:center;gap:8px}
.arrow .big{font-size:40px;color:var(--violet);line-height:1}
.delta-pill{font-family:'Fraunces',serif;font-weight:700;font-size:20px;padding:6px 16px;border-radius:999px;background:rgba(34,197,94,.14);color:var(--green);border:1px solid rgba(34,197,94,.4)}
.delta-pill.neg{background:rgba(239,68,68,.14);color:var(--red);border-color:rgba(239,68,68,.4)}
.verdict{margin:0 28px 26px;padding:16px 20px;border-radius:13px;background:rgba(139,123,255,.08);border:1px solid rgba(139,123,255,.28);font-size:15px}
.verdict b{color:var(--violet)}

/* Guard stat cards */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:18px 16px;text-align:center}
.stat .v{font-family:'Fraunces',serif;font-size:30px;font-weight:700;line-height:1}
.stat .k{font-size:11.5px;color:var(--muted);margin-top:7px;letter-spacing:.3px}
.stat.blk .v{color:var(--orange)} .stat.red .v{color:var(--cyan)} .stat.tot .v{color:var(--violet)} .stat.fwd .v{color:var(--green)}

/* Category comparison */
.cat{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:11px}
.cat-top{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.cat-nm{font-weight:700;font-size:15px}
.owasp{font-size:9.5px;font-weight:700;letter-spacing:.6px;color:var(--violet);border:1px solid rgba(139,123,255,.34);border-radius:5px;padding:2px 6px;background:rgba(139,123,255,.07)}
.cat-delta{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.cat-delta.fix{color:var(--green)} .cat-delta.flat{color:var(--faint)} .cat-delta.worse{color:var(--red)}
.barline{display:flex;align-items:center;gap:12px;margin:7px 0}
.barline .tag{width:54px;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;flex:none}
.track{flex:1;height:13px;border-radius:999px;background:#0b1120;overflow:hidden;border:1px solid var(--line)}
.track > i{display:block;height:100%;border-radius:999px;transition:width .6s ease}
.barline .pct{width:104px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);flex:none}
.foot{margin-top:46px;padding-top:18px;border-top:1px solid var(--line);color:var(--faint);font-size:12px;text-align:center}
.empty{color:var(--faint);text-align:center;padding:30px;font-style:italic}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><b>SynAIpse</b> <em>· Guardrail Impact</em></div>
  <div class="sp"></div>
  <a class="back" href="/">← Back to scanner</a>
</div>
<div class="wrap" id="root"></div>
<script>
const DATA = __COMPARE_DATA__;
function col(s){return s>=90?'var(--green)':s>=80?'#84cc16':s>=70?'var(--yellow)':s>=60?'var(--orange)':'var(--red)';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function gauge(sum,label){
  const s=sum.score||0,c=col(s);
  return `<div class="dial">
    <div class="gauge" style="background:conic-gradient(${c} ${s}%,#1a2238 0)">
      <div class="in"><div>
        <div class="g" style="color:${c}">${esc(sum.grade||'—')}</div>
        <div class="s" style="color:${c}">${s}</div>
        <div class="l">${label}</div>
      </div></div>
    </div>
    <div class="cap"><b>${sum.total_hits||0}</b> hits / ${sum.total_attempts||0} attempts</div>
  </div>`;
}

function render(){
  const root=document.getElementById('root');
  const b=DATA.before||{}, a=DATA.after||{}, g=DATA.guard||{};
  const d=DATA.delta_score||0;
  const meta=DATA.meta||{};
  const improved=d>=0;
  const deltaTxt=(improved?'+':'')+d+' pts';
  let verdict;
  if(d>=40) verdict=`The SynAIpse Aegis guardrail transformed a <b>failing</b> target into a <b>hardened</b> one — resilience climbed <b>${deltaTxt}</b> (${esc(b.grade)} → ${esc(a.grade)}).`;
  else if(d>0) verdict=`The guardrail measurably improved resilience by <b>${deltaTxt}</b> (${esc(b.grade)} → ${esc(a.grade)}).`;
  else verdict=`The guardrail did not improve the score in this run (${deltaTxt}). Try a probe mix with prompt-injection, jailbreak, leakage or toxicity probes.`;

  const cats=(DATA.categories||[]).map(c=>{
    const cls=c.delta>2?'fix':(c.delta<-2?'worse':'flat');
    const dtxt=(c.delta>0?'−':(c.delta<0?'+':'±'))+Math.abs(c.delta)+' pts';
    return `<div class="cat">
      <div class="cat-top">
        <span class="cat-nm">${esc(c.technique||c.family)}</span>
        ${c.owasp?`<span class="owasp">${esc(c.owasp)}</span>`:''}
        <span class="cat-delta ${cls}">${dtxt}</span>
      </div>
      <div class="barline"><span class="tag">Before</span>
        <div class="track"><i style="width:${c.before_pct}%;background:var(--red)"></i></div>
        <span class="pct">${c.before_pct}% · ${c.before_hits} hits</span></div>
      <div class="barline"><span class="tag">After</span>
        <div class="track"><i style="width:${c.after_pct}%;background:var(--green)"></i></div>
        <span class="pct">${c.after_pct}% · ${c.after_hits} hits</span></div>
    </div>`;
  }).join('');

  root.innerHTML=`
    <div class="eyebrow">Before / After · Guardrail Demonstration</div>
    <h1 class="title">Mitigation Impact Report</h1>
    <p class="sub">The same probe suite was run twice against <b>${esc(meta.model||'the target')}</b>: once directly, and once behind the <b>SynAIpse Aegis</b> guardrail. This shows the security uplift a thin defensive layer delivers.</p>

    <div class="sec-tag"><span class="n">01</span> Resilience score</div>
    <div class="card">
      <div class="hero">
        ${gauge(b,'Before')}
        <div class="arrow"><div class="big">→</div><div class="delta-pill ${improved?'':'neg'}">${deltaTxt}</div></div>
        ${gauge(a,'After')}
      </div>
      <div class="verdict">${verdict}</div>
    </div>

    <div class="sec-tag"><span class="n">02</span> Guardrail activity</div>
    <div class="stats">
      <div class="stat blk"><div class="v">${g.blocked_input||0}</div><div class="k">Attacks blocked inbound</div></div>
      <div class="stat red"><div class="v">${g.redacted_output||0}</div><div class="k">Responses redacted</div></div>
      <div class="stat fwd"><div class="v">${g.passed||0}</div><div class="k">Safe requests passed</div></div>
      <div class="stat tot"><div class="v">${g.total||0}</div><div class="k">Total requests proxied</div></div>
    </div>

    <div class="sec-tag"><span class="n">03</span> Per-category attack success (lower is better)</div>
    ${cats||'<div class="empty">No category data available for this comparison.</div>'}

    <div class="foot">Generated by SynAIpse Scanner · Aegis guardrail engine · run ${esc(meta.run_id||'')}</div>`;
}
render();
</script>
</body>
</html>
